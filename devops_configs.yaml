# ============================================================
# Automated Cloud-Based CI/CD Pipeline — DevOps Project
# Docker & Kubernetes Configuration Files
# ============================================================


# ══════════════════════════════════════════════════════════
# FILE 1: Dockerfile
# Multi-stage build for a Python Flask application
# ══════════════════════════════════════════════════════════

# --- dockerfile ---
# Stage 1: Builder
FROM python:3.11-slim AS builder
WORKDIR /app
COPY requirements.txt .
RUN pip install --no-cache-dir --prefix=/install -r requirements.txt

# Stage 2: Runtime (lean final image)
FROM python:3.11-slim AS runtime
WORKDIR /app

# Security: Run as non-root user
RUN groupadd -r appuser && useradd -r -g appuser appuser

# Copy installed dependencies from builder
COPY --from=builder /install /usr/local

# Copy application source
COPY src/ ./src/
COPY config/ ./config/

# Set ownership
RUN chown -R appuser:appuser /app
USER appuser

# Health check
HEALTHCHECK --interval=30s --timeout=10s --start-period=5s --retries=3 \
    CMD curl -f http://localhost:5000/health || exit 1

EXPOSE 5000
CMD ["python", "src/app.py"]


# ══════════════════════════════════════════════════════════
# FILE 2: k8s/deployment.yaml
# Kubernetes Deployment with Rolling Update strategy
# ══════════════════════════════════════════════════════════

# --- k8s/deployment.yaml ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: production
  labels:
    app: myapp
    version: "IMAGE_TAG"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Allow 1 extra pod during update
      maxUnavailable: 0  # Zero downtime guarantee
  template:
    metadata:
      labels:
        app: myapp
        version: "IMAGE_TAG"
    spec:
      containers:
      - name: myapp
        image: 123456789.dkr.ecr.ap-south-1.amazonaws.com/myapp:IMAGE_TAG
        ports:
        - containerPort: 5000
        env:
        - name: APP_ENV
          value: "production"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-host
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
      imagePullSecrets:
      - name: ecr-registry-secret


# ══════════════════════════════════════════════════════════
# FILE 3: k8s/service.yaml
# Kubernetes Service — LoadBalancer type
# ══════════════════════════════════════════════════════════

# --- k8s/service.yaml ---
apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  selector:
    app: myapp
  type: LoadBalancer
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 5000


# ══════════════════════════════════════════════════════════
# FILE 4: k8s/hpa.yaml
# Horizontal Pod Autoscaler — Auto-scaling config
# ══════════════════════════════════════════════════════════

# --- k8s/hpa.yaml ---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: myapp-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70   # Scale up if CPU > 70%
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80   # Scale up if Memory > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300


# ══════════════════════════════════════════════════════════
# FILE 5: prometheus/alert-rules.yaml
# Prometheus Alerting Rules
# ══════════════════════════════════════════════════════════

# --- prometheus/alert-rules.yaml ---
groups:
- name: myapp-alerts
  rules:

  # Alert if any pod is down for > 1 minute
  - alert: PodDown
    expr: kube_pod_status_phase{namespace="production", phase!="Running"} > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Pod {{ $labels.pod }} is not running"
      description: "Pod has been in non-Running state for > 1 minute."

  # Alert if CPU usage > 85%
  - alert: HighCPUUsage
    expr: |
      rate(container_cpu_usage_seconds_total{namespace="production"}[5m]) > 0.85
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage on {{ $labels.pod }}"

  # Alert if HTTP error rate > 5%
  - alert: HighErrorRate
    expr: |
      rate(http_requests_total{status=~"5.."}[5m])
      / rate(http_requests_total[5m]) > 0.05
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "HTTP 5xx error rate above 5%"

  # Alert if deployment rollout is stuck
  - alert: DeploymentNotReady
    expr: |
      kube_deployment_status_replicas_ready{namespace="production"}
      < kube_deployment_spec_replicas{namespace="production"}
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
